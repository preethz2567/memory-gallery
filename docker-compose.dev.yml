services:
  postgres:
    image: postgres:15-alpine
    container_name: memory-gallery-db
    environment:
      POSTGRES_DB: memorygallery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      # Persists data between container restarts
      - postgres_data:/var/lib/postgresql/data
      # Auto-runs schema.sql when the container first starts
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data: